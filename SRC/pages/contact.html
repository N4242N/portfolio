<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Me</title>
    <link rel="stylesheet" type="text/css" href="../style/style.css">
    <link rel="icon" href="../../Assets/favicons/favicon.png" type="image/png" sizes="32x32">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">
</head>

<body>

    <header class="header" id="header">
        <a href="../../index.html" class="logo">
            <span class="main-icon"></span>
            <span>Nadia</span>
        </a>

        <div class="navbar">
            <a href="../../index.html">Home</a>
            <a href="./skills.html">Skills</a>
            <a href="./education.html">Education</a>
            <a href="./gallery.html">Gallery</a>
            <a href="./career.html">Career</a>
            <a href="./hobbies.html">Hobbies</a>
        </div>

        <div class="main">
            <a href="contact.html" class="user main-items active">
                <i class="fas fa-envelope cm-icon"></i>Contact Me
            </a>
            <div class="main-items menu-icon-container" id="menu-icon-js">
                <div class="bx bx-menu" id="menu-icon"></div>
            </div>
        </div>
    </header>

    <div class="page">
        <main class="contact-main">
            <div class="contact-full">

                <!-- LEFT SIDE -->
                <div class="contact-section">
                    <div class="cs-top mobile-show">
                        <h1>Reach Me</h1>
                        <div class="border-line"></div>
                    </div>

                    <div class="cs-item email">
                        <div class="icon"><i class="fas fa-envelope"></i></div>
                        <div class="text">
                            <div class="placeHolder">E-mail</div>
                            <a href="mailto:nadiakabbab38@gmail.com">nadiakabbab38@gmail.com</a>
                        </div>
                    </div>

                    <div class="cs-item number">
                        <div class="icon"><i class="fas fa-phone"></i></div>
                        <div class="text">
                            <div class="placeHolder">Phone</div>
                            <a href="tel:+212669448578">+212 669 448 578</a>
                        </div>
                    </div>

                    <div class="cs-item address">
                        <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="text">
                            <div class="placeHolder">Address</div>
                            <a href="https://maps.google.com/?q=Fès,+Maroc" target="_blank">Fès, Morocco</a>
                        </div>
                    </div>
                </div>

                <!-- RIGHT SIDE (FORM) -->
                <section class="contact-form">
                    <h1>Contact Me</h1>
                    <div class="border-line"></div>

                    <div class="contact-submit-after">
                        <div class="box">
                            <i class="fa-solid fa-circle-check csa-icon"></i>
                            <div class="csa-text">Message sent successfully</div>
                            <div class="csa-ok">OK</div>
                        </div>
                    </div>

                    <form id="contact-form" class="form-section" novalidate>
                        <div class="form-group name-section">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>

                        <div class="error">
                            <i class="fa-solid fa-circle-xmark error-icon"></i>
                            Please fill out all the fields
                        </div>

                        <div class="email-error">
                            <i class="fa-solid fa-circle-xmark error-icon"></i>
                            Email address is not valid
                        </div>

                        <button type="submit" id="contact-submit" class="contact-button">
                            <div class="contact-load">
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                            </div>

                            <div class="submit-text">
                                Submit
                            </div>
                        </button>
                    </form>
                </section>

            </div>
        </main>

        <footer class="footer">
            <div class="left">
                &copy; 2026 • N. Kabbab • All Rights Reserved
            </div>
            <div class="right">
                <div class="social"><a href="https://wa.me/212669448578" target="_blank"><i class="fa-brands fa-whatsapp"></i></a></div>
                <div class="social"><a href="https://www.linkedin.com/in/nadia-kb-3b6bba370/" target="_blank"><i class="fa-brands fa-linkedin"></i></a></div>
                <div class="social"><a href="https://github.com/N4242N" target="_blank"><i class="fa-brands fa-github"></i></a></div>
            </div>
        </footer>
    </div>

    <div class="nav-touch-close" id="nav-tc-js"></div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("x_yxEnuAuvcKwQ1mV");
})();

document.getElementById("contact-form").addEventListener("submit",function(e){
e.preventDefault();

emailjs.send("NadiaKB4242","template_5wqm9df",{
name:document.getElementById("name").value,
email:document.getElementById("email").value,
message:document.getElementById("message").value
})
.then(function(){
alert("Message sent successfully!");
},function(error){
alert("Error: "+JSON.stringify(error));
});
});
</script>

</body>

</html>
